name: Release

# Publishes RootHerald.AspNetCore (pure managed) to NuGet.org. NuGet supports
# OIDC trusted publishing — configure the trusted publisher at
# https://www.nuget.org/account/trustedpublishers before first push.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - run: dotnet pack RootHerald.AspNetCore/RootHerald.AspNetCore.csproj -c Release -o ./nupkgs

      - name: Push to NuGet (trusted publisher)
        run: dotnet nuget push './nupkgs/*.nupkg' --source https://api.nuget.org/v3/index.json
        # NuGet trusted publishing reads the OIDC token from GitHub Actions automatically
        # No NUGET_API_KEY required once trusted publisher is configured

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
